<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ImohMarket | Elite Automotive Exchange</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* NAV FIX */
        .nav-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: nowrap;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            gap: 0.5rem;
            padding: 0 1rem;
        }
        .nav-content::-webkit-scrollbar { display: none; }

        .nav-brand {
            font-size: 1.1rem;
            font-weight: 700;
            flex-shrink: 0;
            white-space: nowrap;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 0.35rem;
            flex-shrink: 0;
            flex-wrap: nowrap;
        }

        #nav-auth {
            display: flex;
            align-items: center;
            gap: 0.35rem;
            flex-wrap: nowrap;
        }

        #nav-auth a,
        #nav-auth .btn,
        #nav-auth .btn-outline {
            font-size: 0.75rem !important;
            padding: 0.35rem 0.6rem !important;
            white-space: nowrap;
            flex-shrink: 0;
        }

        /* HERO FIX */
        .hero {
            width: 100%;
            padding: 0;
        }

        .hero-content {
            text-align: center;
            padding: 50px 16px;
        }

        .hero-title {
            font-size: clamp(1.5rem, 5vw, 3rem);
            margin-bottom: 0.75rem;
            line-height: 1.2;
        }

        .hero-subtitle {
            font-size: clamp(0.9rem, 2.5vw, 1.25rem);
            margin-bottom: 2rem;
            color: #64748b;
        }

        .hero-buttons {
            display: flex;
            gap: 0.75rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .hero-btn {
            padding: 0.75rem 1.5rem;
            font-size: clamp(0.85rem, 2vw, 1rem);
            width: auto;
            min-width: 140px;
        }

        /* GRID FIX */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1.5rem;
        }

        /* CARD FIX */
        .card {
            border-radius: 10px;
            overflow: hidden;
        }

        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            display: block;
            background: #f1f5f9;
        }

        /* broken image fallback */
        .card img::after {
            content: "No Image";
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 180px;
            background: #f1f5f9;
            color: #94a3b8;
            font-size: 0.85rem;
        }

        .card-content {
            padding: 1rem;
        }

        .card-title {
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .card-price {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 0.75rem;
        }

        .card .btn {
            width: 100%;
            font-size: 0.85rem;
            padding: 0.6rem;
        }

        /* MOBILE */
        @media (max-width: 480px) {
            .hero-content { padding: 36px 14px; }

            .hero-buttons {
                flex-direction: column;
                align-items: stretch;
            }

            .hero-btn {
                width: 100%;
                text-align: center;
            }

            .grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 0.75rem;
            }

            .card img { height: 130px; }
            .card-content { padding: 0.75rem; }
            .card-title { font-size: 0.82rem; }
            .card-price { font-size: 0.95rem; }

            .listings-section {
                margin: 1.5rem 0 !important;
            }

            .listings-section h2 {
                font-size: 1.2rem;
                margin-bottom: 1rem !important;
            }
        }

        /* TABLET */
        @media (min-width: 481px) and (max-width: 768px) {
            .grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 1rem;
            }

            .hero-content { padding: 50px 20px; }
        }
    </style>
</head>
<body class="scroll-page">

    <nav>
        <div class="container nav-content">
            <a href="index.html" class="nav-brand">ImohMarket</a>
            <div class="nav-links">
                <button onclick="toggleTheme()"
                    style="background:none; border:none; cursor:pointer; font-size:1.1rem; outline:none; flex-shrink:0;">
                    🌓
                </button>
                <div id="nav-auth" style="display:flex; gap:0.35rem; align-items:center;">
                    <a href="login.html" class="btn-outline"
                        style="width:auto; padding:0.35rem 0.7rem; font-size:0.8rem;">Login</a>
                    <a href="signup.html" class="btn"
                        style="width:auto; padding:0.35rem 0.7rem; font-size:0.8rem;">Sign Up</a>
                </div>
            </div>
        </div>
    </nav>

    <header class="hero">
        <div class="container hero-content">
            <h1 class="hero-title">Welcome to ImohMarket</h1>
            <p class="hero-subtitle">The premier destination for elite automotive trade.</p>
            <div class="hero-buttons">
                <a href="products.html" class="btn hero-btn">Explore Inventory</a>
                <a href="#" class="btn-outline hero-btn" onclick="handleListVehicle()">List a Vehicle</a>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="listings-section" style="margin: 3rem 0;">
            <h2 style="text-align:center; margin-bottom:2rem;">Featured Listings</h2>
            <div id="product-grid" class="grid"></div>
        </section>
    </main>

    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', loadProducts);

        function handleListVehicle() {
            const token = localStorage.getItem('token');
            if (token) {
                window.location.href = 'seller-dashboard.html';
            } else {
                window.location.href = 'login.html';
            }
        }
    </script>
</body>
</html>
