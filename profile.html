<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | ImohMarket</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
    <nav>
        <div class="container nav-content">
            <a href="index.html" class="nav-brand">ImohMarket</a>
            <div class="nav-links">
                <button onclick="toggleTheme()" style="background:none;border:none;cursor:pointer;font-size:1.2rem;">🌓</button>
                <div id="nav-auth" style="display:inline-flex;gap:1rem;"></div>
            </div>
        </div>
    </nav>
    <div class="auth-wrapper">
        <div class="auth-container">
            <h2>Account Settings</h2><br>
            <h3>Update Profile</h3><br>
            <form onsubmit="updateProfile(event)">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="prof-username" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="prof-email" class="form-control" required>
                </div>
                <button type="submit" class="btn">Save Changes</button>
            </form>
            <hr style="margin:2rem 0;border:0;border-top:1px solid var(--border);">
            <h3 style="color:var(--danger);">Danger Zone</h3>
            <p style="margin:1rem 0;font-size:0.9rem;">Once deleted, there is no going back.</p>
            <button onclick="deleteAccount()" class="btn btn-danger">Delete Account Permanently</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
