<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | ImohMarket</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .detail-wrapper {
            padding: 2rem 1rem;
        }
        .back-link {
            text-decoration: none;
            color: var(--primary);
            display: inline-block;
            margin-bottom: 1.5rem;
            font-weight: 500;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        #product-detail img {
            width: 100%;
            max-height: 450px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 1.5rem;
        }
        .product-meta {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .meta-item {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.75rem 1rem;
        }
        .meta-item span {
            display: block;
            font-size: 0.8rem;
            color: #64748b;
            margin-bottom: 0.25rem;
        }
        .meta-item strong {
            font-size: 1rem;
        }
        @media (max-width: 480px) {
            .product-meta {
                grid-template-columns: 1fr 1fr;
            }
            #product-detail img {
                max-height: 250px;
            }
        }
    </style>
</head>
<body onload="loadSingleProduct()">
    <nav>
        <div class="container nav-content">
            <a href="index.html" class="nav-brand">ImohMarket</a>
            <div class="nav-links">
                <button onclick="toggleTheme()" style="background:none; border:none; cursor:pointer; font-size: 1.2rem;">🌓</button>
                <div id="nav-auth" style="display:inline-flex; gap:1rem;"></div>
            </div>
        </div>
    </nav>

    <main class="container detail-wrapper">
        <a href="products.html" class="back-link">&larr; Back to Products</a>
        <div id="product-detail">Loading...</div>
    </main>

    <script src="app.js"></script>
</body>
</html>
