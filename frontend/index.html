<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ImohMarket | Elite Automotive Exchange</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="scroll-page">
    <nav>
        <div class="container nav-content">
            <a href="index.html" class="nav-brand">ImohMarket</a>
            <div class="nav-links">
                <button onclick="toggleTheme()" style="background:none; border:none; cursor:pointer; font-size: 1.2rem; outline: none;">🌓</button>
                
                <div id="nav-auth" style="display: flex; gap: 0.5rem; align-items: center;">
                    <a href="login.html" class="btn-outline" style="width: auto; padding: 0.4rem 1rem; font-size: 0.9rem;">Login</a>
                    <a href="signup.html" class="btn" style="width: auto; padding: 0.4rem 1rem; font-size: 0.9rem;">Sign Up</a>
                </div>
            </div>
        </div>
    </nav>

    <header class="hero">
        <div class="container hero-content">
            <h1 class="hero-title">Welcome to ImohMarket</h1>
            <p class="hero-subtitle">The premier destination for elite automotive trade.</p>
            <div class="hero-buttons">
                <a href="products.html" class="btn hero-btn">Explore Inventory</a>
                <a href="#" class="btn-outline hero-btn" onclick="handleListVehicle()">List a Vehicle</a>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="listings-section" style="margin: 3rem 0;">
            <h2 style="text-align: center; margin-bottom: 2rem;">Featured Listings</h2>
            <div id="product-grid" class="grid">
            </div>
        </section>
    </main>

    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', loadProducts);

        function handleListVehicle() {
            const token = localStorage.getItem('token');
            if (token) {
                window.location.href = 'seller-dashboard.html';
            } else {
                window.location.href = 'login.html';
            }
        }
    </script>
</body>
</html>
