<!DOCTYPE html><html lang="en"><head><link rel="stylesheet" href="style.css"><title>Checkout</title></head><body>
    <nav><div class="container nav-content"><a href="index.html" class="nav-brand">ImohMarket</a><div class="nav-links"><button onclick="toggleTheme()" style="background:none; border:none; cursor:pointer; font-size: 1.2rem;">🌓</button><div id="nav-auth" style="display:inline-flex; gap:1rem;"></div></div></div></nav>
    <main class="container" style="max-width: 600px;"><h2>Checkout Securely</h2>
        <div id="checkout-form" class="auth-container" style="margin: 2rem 0; max-width: 100%;"><form onsubmit="processFinalCheckout(event)"><h3 style="margin-bottom: 1rem;">Payment Details (Simulation)</h3><div class="form-group"><label>Card Name</label><input type="text" class="form-control" required></div><div class="form-group"><label>Card Number</label><input type="text" class="form-control" required></div><div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;"><div class="form-group"><label>Expiry</label><input type="text" class="form-control" required></div><div class="form-group"><label>CVC</label><input type="text" class="form-control" required></div></div><button type="submit" class="btn" style="margin-top: 1rem;">Confirm & Pay</button></form></div>
        <div id="success-message" class="hidden auth-container" style="text-align: center; border: 1px solid var(--success); max-width: 100%;"><h3 style="color: var(--success); font-size: 1.5rem;">Payment Successful!</h3><p style="margin: 1rem 0;">Your order has been placed.</p><a href="buyer-dashboard.html" class="btn">Return to Dashboard</a></div>
    </main><script src="app.js"></script></body></html>
