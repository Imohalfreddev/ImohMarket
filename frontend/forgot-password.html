<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | ImohMarket</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
    <nav>
        <div class="container nav-content">
            <a href="index.html" class="nav-brand">ImohMarket</a>
            <div class="nav-links">
                <button onclick="toggleTheme()" style="background:none;border:none;cursor:pointer;font-size:1.2rem;">🌓</button>
            </div>
        </div>
    </nav>
    <div class="auth-wrapper">
        <div class="auth-container">
            <h2>Forgot Password</h2><br>
            <form onsubmit="requestReset(event)">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="reset-email" class="form-control" placeholder="Enter your email" required>
                </div>
                <button type="submit" class="btn">Send Reset Link</button>
            </form>
            <div style="text-align:center;margin-top:1rem;">
                <a href="login.html" style="color:var(--primary);text-decoration:none;">Back to Login</a>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
