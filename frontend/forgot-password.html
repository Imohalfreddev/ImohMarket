<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <title>Forgot Password</title>
</head>
<body>
    <nav>
        <div class="container nav-content">
            <a href="index.html" class="nav-brand">ImohMarket</a>
            <div class="nav-links">
                <button onclick="toggleTheme()" style="background:none; border:none; cursor:pointer; font-size: 1.2rem;">🌓</button>
            </div>
        </div>
    </nav>
    <div class="auth-container">
        <h2>Reset Password</h2><br>
        <form onsubmit="requestReset(event)">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="reset-email" class="form-control" required>
            </div>
            <button type="submit" class="btn">Send Reset Link</button>
        </form>
    </div>
    <script src="app.js"></script>
</body>
</html>
