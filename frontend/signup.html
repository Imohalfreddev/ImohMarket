<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | ImohMarket</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
    <nav>
        <div class="container nav-content">
            <a href="index.html" class="nav-brand">ImohMarket</a>
            <div class="nav-links">
                <button onclick="toggleTheme()" style="background:none;border:none;cursor:pointer;font-size:1.2rem;outline:none;">🌓</button>
                
                <div id="nav-auth">
                    <a href="login.html" style="margin-left: 1rem; color: var(--text-dark); text-decoration: none; font-weight: 500;">Login</a>
                </div>

            </div>
        </div>
    </nav>
    <div class="auth-wrapper">
        <div class="auth-container">
            <h2>Create Account</h2><br>
            <form onsubmit="signup(event)">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="fullname" class="form-control" placeholder="e.g. John Doe" required>
                </div>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" class="form-control" required>
                    <button type="button" id="togglePwd" class="pwd-toggle" onclick="togglePassword('password','togglePwd')">SHOW</button>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="confirm-password" class="form-control" required>
                    <button type="button" id="toggleConfirmPwd" class="pwd-toggle" onclick="togglePassword('confirm-password','toggleConfirmPwd')">SHOW</button>
                </div>
                <div class="form-group">
                    <label>I want to:</label>
                    <select id="role" class="form-control">
                        <option value="buyer">Buy Products</option>
                        <option value="seller">Sell Products</option>
                    </select>
                </div>
                <button type="submit" class="btn">Sign Up</button>
            </form>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
