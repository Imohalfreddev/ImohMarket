<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Dashboard | ImohMarket</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .dashboard-wrapper {
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .dashboard-container {
            width: 100%;
            max-width: 800px;
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            margin-bottom: 2rem;
        }
        .two-col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        .listing-card {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 1rem;
            background: var(--card-bg);
        }
        .listing-card img {
            width: 100px;
            height: 70px;
            object-fit: cover;
            border-radius: 6px;
            flex-shrink: 0;
        }
        .listing-card-info {
            flex: 1;
        }
        .listing-card-info h4 {
            margin: 0 0 0.25rem 0;
            font-size: 1rem;
        }
        .listing-card-info p {
            margin: 0;
            color: #64748b;
            font-size: 0.9rem;
        }
        .listing-card-actions {
            display: flex;
            gap: 0.5rem;
            flex-shrink: 0;
        }
        .photo-hint {
            font-size: 0.8rem;
            color: #64748b;
            margin-top: 4px;
        }
        @media (max-width: 600px) {
            .dashboard-wrapper { padding: 1rem 0.5rem; }
            .dashboard-container { padding: 1.2rem 1rem; border-radius: 6px; }
            .two-col { grid-template-columns: 1fr; gap: 0; }
            .btn { font-size: 1rem; padding: 0.85rem; }
            h2 { font-size: 1.4rem; }
            h3 { font-size: 1.1rem; }
            .listing-card { flex-direction: column; align-items: flex-start; }
            .listing-card img { width: 100%; height: 160px; }
            .listing-card-actions { width: 100%; }
            .listing-card-actions a,
            .listing-card-actions button { flex: 1; text-align: center; }
        }
    </style>
</head>
<body class="scroll-page" onload="loadMyListings()">
    <nav>
        <div class="container nav-content">
            <a href="index.html" class="nav-brand">ImohMarket</a>
            <div class="nav-links">
                <button onclick="toggleTheme()" style="background:none;border:none;cursor:pointer;font-size:1.2rem;outline:none;">🌓</button>
                <div id="nav-auth" style="display: flex; gap: 0.5rem; align-items: center;"></div>
            </div>
        </div>
    </nav>

    <div class="dashboard-wrapper">

        <!-- Post New Listing -->
        <div class="dashboard-container">
            <h2>Seller Dashboard</h2><br>
            <h3>List a New Vehicle</h3><br>
            <form onsubmit="addProduct(event)">
                <div class="form-group">
                    <label>Listing Title</label>
                    <input type="text" id="name" class="form-control" placeholder="e.g. 2022 Luxury Sports Sedan" required>
                </div>
                <div class="two-col">
                    <div class="form-group">
                        <label>Make (Brand)</label>
                        <input type="text" id="make" class="form-control" placeholder="Toyota" required>
                    </div>
                    <div class="form-group">
                        <label>Model</label>
                        <input type="text" id="model" class="form-control" placeholder="Camry" required>
                    </div>
                    <div class="form-group">
                        <label>Year</label>
                        <input type="number" id="year" class="form-control" placeholder="2022" required>
                    </div>
                    <div class="form-group">
                        <label>Mileage (km)</label>
                        <input type="number" id="mileage" class="form-control" placeholder="15000" required>
                    </div>
                    <div class="form-group">
                        <label>Fuel Type</label>
                        <select id="fuel_type" class="form-control">
                            <option value="Petrol">Petrol</option>
                            <option value="Diesel">Diesel</option>
                            <option value="Electric">Electric</option>
                            <option value="Hybrid">Hybrid</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Transmission</label>
                        <select id="transmission" class="form-control">
                            <option value="Automatic">Automatic</option>
                            <option value="Manual">Manual</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Price ($)</label>
                    <input type="number" step="0.01" id="price" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Detailed Description</label>
                    <textarea id="description" class="form-control" rows="4" required></textarea>
                </div>

                <!-- 3 Image Uploads -->
                <div class="form-group">
                    <label>Main Photo <span style="color:var(--danger);">*</span></label>
                    <input type="file" id="image_file" class="form-control" accept="image/*" required>
                    <p class="photo-hint">Required — front or best angle</p>
                </div>
                <div class="form-group">
                    <label>Photo 2 <span style="color:#64748b;">(optional)</span></label>
                    <input type="file" id="image_file_2" class="form-control" accept="image/*">
                    <p class="photo-hint">Interior or side view</p>
                </div>
                <div class="form-group">
                    <label>Photo 3 <span style="color:#64748b;">(optional)</span></label>
                    <input type="file" id="image_file_3" class="form-control" accept="image/*">
                    <p class="photo-hint">Rear or engine view</p>
                </div>

                <button type="submit" class="btn" style="margin-top: 1rem; width: 100%;">Post Listing</button>
            </form>
        </div>

        <!-- My Listings -->
        <div class="dashboard-container">
            <h3>My Listings</h3><br>
            <div id="my-listings">
                <p style="color:#64748b;">Loading your listings...</p>
            </div>
        </div>

    </div>
    <script src="app.js"></script>
</body>
</html>
