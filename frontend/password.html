<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | ImohMarket</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="container nav-content">
            <a href="index.html" class="nav-brand">ImohMarket</a>
            <div class="nav-links">
                <button onclick="toggleTheme()" style="background:none; border:none; cursor:pointer; font-size: 1.2rem;">🌓</button>
                <a href="login.html">Login</a>
            </div>
        </div>
    </nav>

    <div class="auth-wrapper">
        <div class="auth-container">
            <h2>Reset Password</h2><br>
            <p style="color: #64748b; margin-bottom: 1.5rem; font-size: 0.95rem;">
                Enter your email and we'll send a reset link.
            </p>
            <form action="#">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="e.g. yourname@email.com" required>
                </div>
                <button type="submit" class="btn">Submit Request</button>
            </form>
            <div style="text-align: center; margin-top: 1rem;">
                <a href="login.html" style="color: var(--primary); text-decoration: none;">Back to Login</a>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
