<!DOCTYPE html><html lang="en"><head><link rel="stylesheet" href="style.css"><title>Login</title></head><body>
    <nav><div class="container nav-content"><a href="index.html" class="nav-brand">ImohMarket</a><div class="nav-links"><button onclick="toggleTheme()" style="background:none; border:none; cursor:pointer; font-size: 1.2rem;">🌓</button></div></div></nav>
    <div class="auth-container"><h2>Sign In</h2><br>
        <form onsubmit="login(event)">
            <div class="form-group"><label>Username</label><input type="text" id="username" class="form-control" required></div>
            <div class="form-group"><label>Password</label><input type="password" id="password" class="form-control" required><button type="button" id="togglePwd" class="pwd-toggle" onclick="togglePassword('password', 'togglePwd')">SHOW</button></div>
            <button type="submit" class="btn">Login</button>
        </form>
        <div style="text-align: center; margin-top: 1rem;"><a href="forgot-password.html" style="color: var(--primary); text-decoration: none;">Forgot Password?</a></div>
    </div><script src="app.js"></script></body></html>
