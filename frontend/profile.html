<!DOCTYPE html><html lang="en"><head><link rel="stylesheet" href="style.css"><title>My Profile</title></head><body>
    <nav><div class="container nav-content"><a href="index.html" class="nav-brand">ImohMarket</a><div class="nav-links"><button onclick="toggleTheme()" style="background:none; border:none; cursor:pointer; font-size: 1.2rem;">🌓</button><div id="nav-auth" style="display:inline-flex; gap:1rem;"></div></div></div></nav>
    <main class="container" style="max-width: 600px;"><h2>Account Settings</h2><div class="auth-container" style="margin: 2rem 0; max-width: 100%;"><h3>Update Profile</h3><br><form onsubmit="updateProfile(event)"><div class="form-group"><label>Username</label><input type="text" id="prof-username" class="form-control" required></div><div class="form-group"><label>Email</label><input type="email" id="prof-email" class="form-control" required></div><button type="submit" class="btn">Save Changes</button></form></div><div class="auth-container" style="margin: 2rem 0; max-width: 100%; border-color: var(--danger);"><h3 style="color: var(--danger);">Danger Zone</h3><p style="margin: 1rem 0;">Once deleted, there is no going back.</p><button onclick="deleteAccount()" class="btn btn-danger">Delete Account Permanently</button></div></main><script src="app.js"></script></body></html>
